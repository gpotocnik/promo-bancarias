name: Monitor Promos Bancarias

on:
  schedule:
    # Todos los días 08:00 AM ART (11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Restaurar cache de promos vistas
        uses: actions/cache@v4
        with:
          path: seen_promos.json
          key: seen-promos-${{ github.run_id }}
          restore-keys: |
            seen-promos-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr monitor
        run: python monitor.py

      - name: Guardar cache de promos vistas
        if: always()
        uses: actions/cache@v4
        with:
          path: seen_promos.json
          key: seen-promos-${{ github.run_id }}

      - name: Subir docs/ como artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: monitor
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
